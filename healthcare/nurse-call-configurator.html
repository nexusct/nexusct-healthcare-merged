<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nurse Call System Designer — NexusCT</title>
  <meta name="description" content="Design your nurse call system with NexusCT's interactive configurator. Get instant estimates for Jeron and RCare platforms with financing options.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/nexusct.css">
  <link rel="stylesheet" href="../assets/css/nurse-call.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* ===== Nurse Call Configurator Styles ===== */
    .nc-page-bg {
      background: linear-gradient(135deg, #f0f4f8 0%, #e8edf3 100%);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* Progress Bar */
    .nc-progress-wrap {
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .nc-progress-inner {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .nc-progress-label {
      font-size: 12px;
      font-weight: 700;
      color: #0066B3;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .nc-progress-bar {
      flex: 1;
      height: 6px;
      background: #e2e8f0;
      border-radius: 3px;
      overflow: hidden;
    }
    .nc-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #0066B3, #4CAF50);
      border-radius: 3px;
      transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      width: 0%;
    }
    .nc-progress-step {
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      white-space: nowrap;
    }

    /* Chat Container */
    .nc-chat-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 16px;
    }
    .nc-chat-window {
      background: #0b1220;
      border-radius: 20px;
      padding: 32px 24px;
      min-height: 500px;
      box-shadow: 0 20px 60px rgba(11,18,32,0.3), 0 4px 20px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
    }
    .nc-chat-window::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,102,179,0.5), transparent);
    }

    /* Chat Header */
    .nc-chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 24px;
    }
    .nc-chat-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #0066B3, #4CAF50);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .nc-chat-avatar svg {
      width: 22px;
      height: 22px;
    }
    .nc-chat-header-text h4 {
      font-family: 'Manrope', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      margin: 0;
    }
    .nc-chat-header-text span {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
    }
    .nc-chat-status {
      width: 8px;
      height: 8px;
      background: #4CAF50;
      border-radius: 50%;
      margin-left: auto;
      box-shadow: 0 0 8px rgba(76,175,80,0.5);
      animation: nc-pulse 2s infinite;
    }
    @keyframes nc-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Messages Area */
    .nc-messages {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: 60vh;
      overflow-y: auto;
      padding-right: 8px;
      scroll-behavior: smooth;
    }
    .nc-messages::-webkit-scrollbar {
      width: 4px;
    }
    .nc-messages::-webkit-scrollbar-track {
      background: transparent;
    }
    .nc-messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
    }

    /* Message Bubbles */
    .nc-msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: nc-fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes nc-fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .nc-msg-avatar {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #0066B3, #4CAF50);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .nc-msg-avatar svg {
      width: 18px;
      height: 18px;
    }
    .nc-msg-bubble {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px 14px 14px 4px;
      padding: 14px 18px;
      color: rgba(255,255,255,0.9);
      font-size: 14px;
      line-height: 1.6;
      max-width: 85%;
    }
    .nc-msg-user {
      flex-direction: row-reverse;
    }
    .nc-msg-user .nc-msg-bubble {
      background: rgba(0,102,179,0.25);
      border-color: rgba(0,102,179,0.3);
      border-radius: 14px 14px 4px 14px;
      color: rgba(255,255,255,0.95);
    }
    .nc-msg-user .nc-msg-avatar {
      display: none;
    }

    /* Typing Indicator */
    .nc-typing {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: nc-fadeIn 0.3s ease;
    }
    .nc-typing-dots {
      display: flex;
      gap: 4px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px 14px 14px 4px;
    }
    .nc-typing-dot {
      width: 7px;
      height: 7px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      animation: nc-typingBounce 1.4s infinite;
    }
    .nc-typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .nc-typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes nc-typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Selection Cards */
    .nc-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .nc-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .nc-card:hover {
      background: rgba(0,102,179,0.15);
      border-color: rgba(0,102,179,0.4);
      transform: translateY(-2px);
    }
    .nc-card.selected {
      background: rgba(0,102,179,0.25);
      border-color: #0066B3;
      box-shadow: 0 0 20px rgba(0,102,179,0.2);
    }
    .nc-card-icon {
      font-size: 24px;
      color: #0066B3;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,102,179,0.1);
      border-radius: 12px;
    }
    .nc-card-title {
      font-size: 12.5px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      line-height: 1.3;
    }
    .nc-card-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      line-height: 1.4;
    }

    /* Platform Cards (larger) */
    .nc-platform-cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 12px;
    }
    .nc-platform-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 18px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .nc-platform-card:hover {
      background: rgba(0,102,179,0.12);
      border-color: rgba(0,102,179,0.35);
    }
    .nc-platform-card.selected {
      background: rgba(0,102,179,0.2);
      border-color: #0066B3;
    }
    .nc-platform-name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .nc-platform-type {
      font-size: 11px;
      color: #0066B3;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .nc-platform-features {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .nc-platform-tag {
      font-size: 10.5px;
      padding: 3px 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      color: rgba(255,255,255,0.6);
    }
    .nc-platform-best {
      font-size: 11.5px;
      color: #4CAF50;
      font-weight: 500;
    }

    /* Help Me Decide Button */
    .nc-help-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(76,175,80,0.15);
      border: 1px solid rgba(76,175,80,0.3);
      border-radius: 8px;
      padding: 8px 16px;
      color: #4CAF50;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.2s ease;
    }
    .nc-help-btn:hover {
      background: rgba(76,175,80,0.25);
    }

    /* Slider */
    .nc-slider-wrap {
      margin-top: 12px;
      padding: 16px 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
    }
    .nc-slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .nc-slider-label span {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    }
    .nc-slider-value {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      font-family: 'Manrope', sans-serif;
    }
    .nc-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #0066B3 0%, #e2e8f0 0%);
      outline: none;
      cursor: pointer;
    }
    .nc-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #0066B3;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .nc-slider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #0066B3;
      cursor: pointer;
    }
    .nc-slider-confirm {
      margin-top: 14px;
      display: flex;
      justify-content: flex-end;
    }

    /* Checkbox Options */
    .nc-checkbox-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }
    .nc-checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .nc-checkbox-item:hover {
      background: rgba(0,102,179,0.1);
      border-color: rgba(0,102,179,0.3);
    }
    .nc-checkbox-item.checked {
      background: rgba(0,102,179,0.15);
      border-color: rgba(0,102,179,0.4);
    }
    .nc-checkbox-box {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }
    .nc-checkbox-item.checked .nc-checkbox-box {
      background: #0066B3;
      border-color: #0066B3;
    }
    .nc-checkbox-box i {
      font-size: 10px;
      color: #fff;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .nc-checkbox-item.checked .nc-checkbox-box i {
      opacity: 1;
    }
    .nc-checkbox-label {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      font-weight: 500;
    }

    /* Confirm Button */
    .nc-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }
    .nc-btn-primary {
      background: linear-gradient(135deg, #0066B3, #0077CC);
      color: #fff;
    }
    .nc-btn-primary:hover {
      background: linear-gradient(135deg, #005A9E, #006BB8);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0,102,179,0.4);
    }
    .nc-btn-secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.8);
    }
    .nc-btn-secondary:hover {
      background: rgba(255,255,255,0.12);
    }
    .nc-btn-green {
      background: linear-gradient(135deg, #4CAF50, #43A047);
      color: #fff;
    }
    .nc-btn-green:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(76,175,80,0.4);
    }

    /* Yes/No Cards */
    .nc-yesno {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    /* Lead Capture Form */
    .nc-form {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .nc-form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .nc-form-label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .nc-form-input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 11px 14px;
      color: #fff;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .nc-form-input:focus {
      border-color: #0066B3;
    }
    .nc-form-input::placeholder {
      color: rgba(255,255,255,0.25);
    }
    .nc-form-textarea {
      resize: vertical;
      min-height: 80px;
    }
    .nc-form-error {
      font-size: 11px;
      color: #ef4444;
      display: none;
    }

    /* Comparison Modal */
    .nc-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: nc-fadeIn 0.3s ease;
    }
    .nc-modal-overlay.active {
      display: flex;
    }
    .nc-modal {
      background: #0f1a2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      max-width: 820px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 32px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }
    .nc-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .nc-modal-header h3 {
      font-family: 'Manrope', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      margin: 0;
    }
    .nc-modal-close {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s ease;
    }
    .nc-modal-close:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }
    .nc-compare-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }
    .nc-compare-table th {
      font-size: 12px;
      font-weight: 700;
      color: #0066B3;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      text-align: left;
    }
    .nc-compare-table td {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .nc-compare-table tr:last-child td {
      border-bottom: none;
    }
    .nc-compare-table .feature-name {
      font-weight: 600;
      color: rgba(255,255,255,0.9);
    }
    .nc-compare-check {
      color: #4CAF50;
    }
    .nc-compare-x {
      color: rgba(255,255,255,0.2);
    }

    /* ===== RESULTS MODE ===== */
    .nc-results-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
      display: none;
    }
    .nc-results-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .nc-results-header h2 {
      font-family: 'Manrope', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #0b1220;
      margin-bottom: 8px;
    }
    .nc-results-header p {
      font-size: 14px;
      color: #64748b;
    }

    /* Result Panels */
    .nc-result-panel {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      border: 1px solid rgba(0,0,0,0.04);
    }
    .nc-result-panel h3 {
      font-family: 'Manrope', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #0b1220;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nc-result-panel h3 i {
      color: #0066B3;
      font-size: 18px;
    }

    /* Summary Grid */
    .nc-summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
    }
    .nc-summary-item {
      padding: 14px;
      background: #f8fafc;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.04);
    }
    .nc-summary-label {
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .nc-summary-value {
      font-size: 15px;
      font-weight: 700;
      color: #0b1220;
    }

    /* Component List */
    .nc-component-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .nc-component-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: #f8fafc;
      border-radius: 8px;
    }
    .nc-component-name {
      font-size: 13.5px;
      font-weight: 500;
      color: #334155;
    }
    .nc-component-qty {
      font-size: 13px;
      font-weight: 700;
      color: #0066B3;
      background: rgba(0,102,179,0.08);
      padding: 3px 12px;
      border-radius: 20px;
    }

    /* Investment Display */
    .nc-investment-display {
      text-align: center;
      padding: 32px 20px;
      background: linear-gradient(135deg, #0b1220, #162036);
      border-radius: 16px;
      margin-bottom: 20px;
    }
    .nc-investment-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
    }
    .nc-investment-range {
      font-family: 'Manrope', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 8px;
    }
    .nc-investment-perbed {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
    }

    /* Financing Cards */
    .nc-financing-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .nc-finance-card {
      padding: 20px 16px;
      background: #f8fafc;
      border-radius: 12px;
      text-align: center;
      border: 2px solid transparent;
      position: relative;
    }
    .nc-finance-card.highlighted {
      border-color: #4CAF50;
      background: rgba(76,175,80,0.04);
    }
    .nc-finance-badge {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      background: #4CAF50;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .nc-finance-term {
      font-size: 13px;
      font-weight: 700;
      color: #334155;
      margin-bottom: 10px;
    }
    .nc-finance-amount {
      font-family: 'Manrope', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #0b1220;
      margin-bottom: 4px;
    }
    .nc-finance-note {
      font-size: 11px;
      color: #94a3b8;
    }

    /* NCaaS Section */
    .nc-ncaas-panel {
      background: linear-gradient(135deg, #0066B3, #0077CC);
      border-radius: 16px;
      padding: 32px;
      color: #fff;
      margin-bottom: 20px;
    }
    .nc-ncaas-panel h3 {
      color: #fff;
      margin-bottom: 6px;
    }
    .nc-ncaas-panel h3 i {
      color: rgba(255,255,255,0.8);
    }
    .nc-ncaas-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 24px;
    }
    .nc-ncaas-price {
      font-family: 'Manrope', sans-serif;
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .nc-ncaas-perbed {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 20px;
    }
    .nc-ncaas-features {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }
    .nc-ncaas-feature {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: rgba(255,255,255,0.85);
    }
    .nc-ncaas-feature i {
      color: #fff;
      font-size: 11px;
    }

    /* Action Buttons */
    .nc-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    .nc-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }
    .nc-action-primary {
      background: #0066B3;
      color: #fff;
    }
    .nc-action-primary:hover {
      background: #005A9E;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0,102,179,0.3);
      color: #fff;
    }
    .nc-action-secondary {
      background: #f1f5f9;
      color: #334155;
      border: 1px solid #e2e8f0;
    }
    .nc-action-secondary:hover {
      background: #e2e8f0;
    }
    .nc-action-green {
      background: #4CAF50;
      color: #fff;
    }
    .nc-action-green:hover {
      background: #43A047;
      transform: translateY(-1px);
      color: #fff;
    }

    /* Admin Panel */
    .nc-admin-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 2000;
      padding: 20px;
      overflow-y: auto;
    }
    .nc-admin-overlay.active {
      display: block;
    }
    .nc-admin-panel {
      max-width: 1000px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 32px;
    }
    .nc-admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .nc-admin-header h2 {
      font-family: 'Manrope', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #0b1220;
      margin: 0;
    }
    .nc-admin-login {
      max-width: 400px;
      margin: 100px auto;
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
    }
    .nc-admin-login h3 {
      font-family: 'Manrope', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #0b1220;
      margin-bottom: 20px;
    }
    .nc-quote-card {
      background: #f8fafc;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
      border: 1px solid rgba(0,0,0,0.04);
    }
    .nc-quote-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .nc-quote-name {
      font-size: 15px;
      font-weight: 700;
      color: #0b1220;
    }
    .nc-quote-date {
      font-size: 11px;
      color: #94a3b8;
    }
    .nc-quote-details {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 8px;
      font-size: 12.5px;
    }
    .nc-quote-detail {
      color: #64748b;
    }
    .nc-quote-detail strong {
      color: #334155;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .nc-chat-window {
        padding: 20px 16px;
        border-radius: 16px;
      }
      .nc-cards {
        grid-template-columns: 1fr;
      }
      .nc-financing-grid {
        grid-template-columns: 1fr;
      }
      .nc-investment-range {
        font-size: 26px;
      }
      .nc-ncaas-price {
        font-size: 24px;
      }
      .nc-chat-container {
        padding: 0 8px;
        margin: 20px auto;
      }
      .nc-results-container {
        margin: 20px auto;
      }
      .nc-actions {
        flex-direction: column;
      }
      .nc-action-btn {
        width: 100%;
        justify-content: center;
      }
      .nc-yesno {
        grid-template-columns: 1fr;
      }
      .nc-summary-grid {
        grid-template-columns: 1fr 1fr;
      }
      .nc-modal {
        padding: 20px;
      }
      .nc-compare-table {
        font-size: 11px;
      }
      .nc-compare-table th,
      .nc-compare-table td {
        padding: 8px 8px;
      }
    }
    @media (max-width: 480px) {
      .nc-summary-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
